name: Build and Sign Frida iOS (The Gospel)

on:
  workflow_dispatch: # Manual trigger when you're ready to cook
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout the Heat
        uses: actions/checkout@v4
        with:
          submodules: recursive # Get the subprojects or the stove stays cold

      - name: Setup the Lab
        run: |
          brew install meson ninja pkg-config node
          pip3 install colorama prompt-toolkit pygments websockets

      - name: Import the Ice (P12 Certificate)
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install the Hall Pass (Provisioning Profile)
        env:
          PROVISIONING_CERTIFICATE_BASE64: ${{ secrets.PROVISION_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROVISIONING_CERTIFICATE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Cook the Binary
        run: |
          # We're building for arm64e (iPhone 17 Pro territory)
          # 'make' calls the internal scripts to compile the core and gadget
          make ios-arm64e

      - name: The Surgical Sign
        run: |
          # Locate the built gadget and sign it so the iPhone doesn't spit it out
          # Using the identity from your p12
          IDENTITY=$(security find-identity -v -p codesigning | head -n 1 | awk -F '"' '{print $2}')
          codesign -f -s "$IDENTITY" build/frida-ios-arm64e/lib/frida/64/frida-gadget.dylib

      - name: Stash the Product
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-signed
          path: build/frida-ios-arm64e/lib/frida/64/frida-gadget.dylib
