name: Build and Sign Frida iOS (The Gospel)

on:
  workflow_dispatch: # Manual trigger for when the block is hot
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest # Apple SDKs only live here
    
    steps:
      - name: Checkout the Heat
        uses: actions/checkout@v4
        with:
          submodules: recursive # Don't leave the subprojects in the cold

      - name: Setup the Lab
        run: |
          # Install the heavy machinery
          brew install meson ninja pkg-config node
          
          # Bypass PEP 668: No permission asked, no permission given.
          pip3 install --break-system-packages colorama prompt-toolkit pygments websockets

      - name: Import the Ice (P12 Certificate)
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Install the Hall Pass (Provisioning Profile)
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # We decode your .mobileprovision directly into the Apple vault
          echo -n "${{ secrets.PROVISION_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/signed.mobileprovision

      - name: Cook the Binary
        run: |
          # Building specifically for the iPhone 17 Pro (arm64e)
          # This is a long cook. Let the stove sizzle.
          make ios-arm64e

      - name: The Surgical Sign
        run: |
          # Grabbing your identity from the keychain
          IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Development" | head -n 1 | awk -F '"' '{print $2}')
          
          if [ -z "$IDENTITY" ]; then
            echo "[-] COULD NOT FIND THE ICE. CHECK YOUR P12_BASE64."
            exit 1
          fi

          echo "[+] SIGNING WITH IDENTITY: $IDENTITY"
          
          # Target the specific dylib for injection
          TARGET_PATH="build/frida-ios-arm64e/lib/frida/64/frida-gadget.dylib"
          
          if [ -f "$TARGET_PATH" ]; then
            codesign -f -s "$IDENTITY" "$TARGET_PATH"
            echo "[+] GADGET SIGNED AND READY FOR THE STREETS."
          else
            echo "[-] BUILD FAILED. NO DYLIB FOUND."
            exit 1
          fi

      - name: Stash the Product
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-signed-gadget
          path: build/frida-ios-arm64e/lib/frida/64/frida-gadget.dylib
